<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishwar Pharma Gx Search</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./favicon.png">

    <!-- Apple iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="./favicon.png">

    <!-- Optional: for better iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        body {
            font-family: Calibri, sans-serif;
            font-size: 10pt;
            text-align: center;
            background-color: #F7F7F7;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: 18pt;
            font-weight: bold;
            margin: 20px 0;
            color: #4A90E2;
        }

        #searchBar {
            width: 80%;
            padding: 12px;
            font-size: 14pt;
            border: 2px solid #28A745;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #FFFFFF;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 20px;
            font-size: 14pt;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #357ABD;
        }

        table {
            width: 100%;
            max-width: 95%;
            border-collapse: collapse;
            margin: 20px auto;
            table-layout: auto;
            word-wrap: break-word;
            background-color: #FFFFFF;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        table,
        th,
        td {
            border: 1px solid #ddd;
        }

        th,
        td {
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }

        th {
            background-color: #4A90E2;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #F7F7F7;
        }

        tr:hover {
            background-color: #E1F5FE;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        .red {
            color: red;
            font-weight: bold;
        }

        #recordCount {
            margin: 10px 0;
            font-weight: bold;
            color: #333333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #searchBar {
                width: 95%;
                font-size: 12pt;
            }

            button {
                font-size: 12pt;
            }

            th,
            td {
                font-size: 10pt;
                padding: 8px;
            }

            h1 {
                font-size: 14pt;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
</head>

<body>
    <h1>✨ Ishwar Pharma Gx Search ✨</h1>
    <div id="recordCount">Number of records: 0</div>
    <br>
    <div style="position: relative; display: inline-block; width: 100%;">
        <input type="text" id="searchBar" placeholder="🔍 Start typing to search..." oninput="onInputChange()">
    </div>
    <br><br>
    <button onclick="resetSearch()">↺ Reset</button>
    <br><br>
    <table id="resultsTable">
        <thead>
            <tr>
                <th>Brand 🎉</th>
                <th>Company 💼</th>
                <th>Pack 📦</th>
                <th>List Rate 💸</th>
                <th>Bulk Rate 💵</th>
                <th>MRP 🎁</th>
                <th>Content 🌿</th>
                <th>Case 🗲</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="8">Waiting for input...</td>
            </tr>
        </tbody>
    </table>

    <!-- YOUR JS SAME AS BEFORE --> 
  
  
  <script>
        let jsonData = [];

        window.onload = loadData;

        function loadData() {
            const file = '4IshwarApp.xlsx';
            const reader = new FileReader();
            fetch(file).then(response => {
                if (response.ok) return response.blob();
                else throw new Error('File not found');
            }).then(blob => {
                const fileReader = new FileReader();
                fileReader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    jsonData = XLSX.utils.sheet_to_json(sheet);
                    document.getElementById('recordCount').textContent = `Number of records: ${jsonData.length}`;
                };
                fileReader.readAsArrayBuffer(blob);
            }).catch(error => {
                console.error('Error loading file:', error);
                document.getElementById('recordCount').textContent = 'Error loading data';
            });
        }

        function onInputChange() {
            const searchBar = document.getElementById('searchBar');
            const input = searchBar.value.toLowerCase();
            if (input.length >= 3) {
                search(input);
            } else {
                showInitialMessage();
            }
        }


function search(input) {
    const terms = input.split(' ').filter(term => term);
    const results = jsonData.filter(item => {
        return terms.every(term => {
            return ['BRAND', 'COMPANY', 'CONTENT'].some(key =>
                item[key] && item[key].toString().toLowerCase().includes(term)
            );
        });
    });

    // Sorting with score + content length + brand name
    results.sort((a, b) => {
        const getScore = (item) => {
            let score = 0;
            const brand = item.BRAND ? item.BRAND.toLowerCase() : "";
            const company = item.COMPANY ? item.COMPANY.toLowerCase() : "";
            const content = item.CONTENT ? item.CONTENT.toLowerCase() : "";

            terms.forEach(term => {
                if (brand.includes(term)) score += 3;    // highest weight
                if (company.includes(term)) score += 2;  // medium weight
                if (content.includes(term)) score += 1;  // lowest weight
            });

            return { score, contentLength: content.length };
        };

        const aData = getScore(a);
        const bData = getScore(b);

        // Higher score first
        if (aData.score !== bData.score) {
            return bData.score - aData.score;
        }

        // Then shorter content length
        if (aData.contentLength !== bData.contentLength) {
            return aData.contentLength - bData.contentLength;
        }

        // Finally alphabetical by BRAND
        return a.BRAND.localeCompare(b.BRAND);
    });

    // Render results
    const resultsTable = document.getElementById('resultsTable').getElementsByTagName('tbody')[0];
    resultsTable.innerHTML = '';
    if (results.length === 0) {
        resultsTable.innerHTML = '<tr><td colspan="8">No records found.</td></tr>';
    }
    results.forEach(result => {
        const row = resultsTable.insertRow();
        row.insertCell().innerHTML = highlightMatch(result.BRAND, terms);
        row.insertCell().innerHTML = highlightMatch(result.COMPANY, terms);
        row.insertCell().textContent = result.PACK || 'N/A';
        row.insertCell().textContent = isNumeric(result.RATE) ? Number(result.RATE).toFixed(2) : 'N/A';
        const freeSchemeCell = row.insertCell();
        freeSchemeCell.textContent = isNumeric(result["Free Scheme"]) ? Number(result["Free Scheme"]).toFixed(2) : 'N/A';
        freeSchemeCell.classList.add('red');
        row.insertCell().textContent = isNumeric(result.MRP) ? Number(result.MRP).toFixed(2) : 'N/A';
        row.insertCell().innerHTML = highlightMatch(result.CONTENT, terms);
        row.insertCell().textContent = result.CASE || 'N/A';
    });
}


        function resetSearch() {
            document.getElementById('searchBar').value = '';
            showInitialMessage();
        }

        function showInitialMessage() {
            const resultsTable = document.getElementById('resultsTable').getElementsByTagName('tbody')[0];
            resultsTable.innerHTML = '<tr><td colspan="8">Waiting for input...</td></tr>';
        }

        function isNumeric(value) {
            return !isNaN(parseFloat(value)) && isFinite(value);
        }

function highlightMatch(text, terms) {
    if (!text) return 'N/A';

    // Convert to string
    let safeText = text.toString();

    // Escape HTML first (so raw <, > don’t break)
    safeText = safeText
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

    // Then apply highlighting
    terms.forEach(term => {
        if (term) {
            const regex = new RegExp(`(${term})`, 'gi');
            safeText = safeText.replace(regex, `<span class="highlight">$1</span>`);
        }
    });

    return safeText;
}

    </script>
</body>

</html>
